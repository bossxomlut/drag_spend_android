name: Build & Deploy to Google Play

on:
  push:
    tags:
      - "v*" # e.g. v1.0.0, v1.2.3-rc1
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track (internal / alpha / beta / production)"
        required: true
        default: "internal"
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

env:
  JAVA_VERSION: "17"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

jobs:
  build-and-deploy:
    name: Build Release AAB & Deploy
    runs-on: ubuntu-latest
    environment: play-store
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      # ── Gradle cache: deps, wrapper AND build-output cache ──────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Derive versionName from tag, versionCode from run number ────────────
      - name: Extract version from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION_NAME="${GITHUB_REF_NAME#v}"
          else
            VERSION_NAME="0.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT
          echo "Building version ${VERSION_NAME} (code: ${GITHUB_RUN_NUMBER})"

      # ── Decode google-services.json stored as a Base64 secret ──────────────
      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json

      # ── Decode the release keystore stored as a Base64 secret ──────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks

      # ── Inject runtime secrets into local.properties ────────────────────────
      - name: Write local.properties
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "SUPABASE_URL=${SUPABASE_URL}" >> local.properties
          echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}" >> local.properties

      # ── Build the release Android App Bundle ────────────────────────────────
      - name: Build Release AAB
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          KEYSTORE_PATH: ${{ github.workspace }}/app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon --build-cache

      # ── Keep the AAB as a workflow artifact for audit / manual download ─────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 14

      # ── Publish to Google Play ───────────────────────────────────────────────
      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.bossxomlut.dragspend
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed

      # ── Extract commit info ────────────────────────────────────────────────
      - name: Extract commit info
        id: commit
        run: |
          echo "message=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT
          echo "time=$(git log -1 --pretty=%ci)" >> $GITHUB_OUTPUT

      # ── Telegram notification ────────────────────────────────────────────────
      - name: Notify Telegram – success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_MSG_RAW: ${{ steps.commit.outputs.message }}
          COMMIT_TIME_RAW: ${{ steps.commit.outputs.time }}
        run: |
          escape_md() {
            printf '%s' "$1" | sed \
              -e 's/\\/\\\\/g' -e 's/\./\\./g' -e 's/!/\\!/g' \
              -e 's/_/\\_/g'   -e 's/\*/\\*/g' -e 's/-/\\-/g' \
              -e 's/+/\\+/g'   -e 's/=/\\=/g' -e 's/|/\\|/g' \
              -e 's/{/\\{/g'   -e 's/}/\\}/g' -e 's/#/\\#/g' \
              -e 's/~/\\~/g'   -e 's/>/\\>/g' -e 's/(/\\(/g' \
              -e 's/)/\\)/g'   -e 's/\[/\\[/g' -e 's/\]/\\]/g'
          }
          COMMIT_MSG=$(escape_md "$COMMIT_MSG_RAW")
          COMMIT_TIME=$(escape_md "$COMMIT_TIME_RAW")
          TAG=$(escape_md "${GITHUB_REF_NAME}")
          TEXT="✅ *Drag Spend* build \`${TAG}\` deployed to Play Store successfully\!%0A%0A📝 *Commit:* ${COMMIT_MSG}%0A🕐 *Time:* ${COMMIT_TIME}%0A%0A🔗 [View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="MarkdownV2" \
            -d text="${TEXT}"

      - name: Notify Telegram – failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_MSG_RAW: ${{ steps.commit.outputs.message }}
          COMMIT_TIME_RAW: ${{ steps.commit.outputs.time }}
        run: |
          escape_md() {
            printf '%s' "$1" | sed \
              -e 's/\\/\\\\/g' -e 's/\./\\./g' -e 's/!/\\!/g' \
              -e 's/_/\\_/g'   -e 's/\*/\\*/g' -e 's/-/\\-/g' \
              -e 's/+/\\+/g'   -e 's/=/\\=/g' -e 's/|/\\|/g' \
              -e 's/{/\\{/g'   -e 's/}/\\}/g' -e 's/#/\\#/g' \
              -e 's/~/\\~/g'   -e 's/>/\\>/g' -e 's/(/\\(/g' \
              -e 's/)/\\)/g'   -e 's/\[/\\[/g' -e 's/\]/\\]/g'
          }
          COMMIT_MSG=$(escape_md "$COMMIT_MSG_RAW")
          COMMIT_TIME=$(escape_md "$COMMIT_TIME_RAW")
          TAG=$(escape_md "${GITHUB_REF_NAME}")
          TEXT="❌ *Drag Spend* build \`${TAG}\` FAILED\.%0A%0A📝 *Commit:* ${COMMIT_MSG}%0A🕐 *Time:* ${COMMIT_TIME}%0A%0A🔗 [View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="MarkdownV2" \
            -d text="${TEXT}"
